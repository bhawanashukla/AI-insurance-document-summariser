<div class="card">
  <div class="card-body">
    <h2 class="card-title">Insurance Document Summariser</h2>
    <p class="text-muted">Upload a PDF or image (jpg/jpeg/png). You can also use the pre-stored sample document.</p>

    <div class="mb-3">
      <input class="form-control" type="file" (change)="onFile($event)" accept=".pdf,image/*" />
    </div>

    <div class="mb-3 d-flex">
      <button class="btn btn-primary me-2" (click)="upload(false)" [disabled]="!file">Upload & Summarise</button>
      <button class="btn btn-outline-secondary" (click)="upload(true)">Use Sample Document</button>
    </div>

    <div *ngIf="loading()" class="alert alert-info">Processing... please wait.</div>
    <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

    <div *ngIf="result" class="mt-3">
      <div class="card">
        <div class="card-body">
          <h5>Extracted Data</h5>
          <pre class="small">{{ result | json }}</pre>
          <h6 class="mt-2">Raw model output</h6>
          <pre class="small">{{ raw }}</pre>
        </div>
      </div>
    </div>
  </div>
</div>
